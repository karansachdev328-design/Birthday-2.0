<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            min-height: 100vh; 
            min-height: 100dvh; 
            display: flex;
            flex-direction: column; 
            padding: 15px 20px; 
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
            text-align: center;
            transition: background 0.8s ease, color 0.8s ease;
            overflow-x: hidden; 
            overflow-y: auto; 
            background: linear-gradient(135deg, #fdfbf7, #fce4ec); /* Elegant light theme */
            color: #1a1a1a;
        }

        /* The Frosted Glass Container */
        .glass-panel {
            width: 100%;
            max-width: 450px;
            margin: auto; 
            padding: 35px 25px; 
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            transition: all 0.5s ease;
        }

        /* Container for the visual element */
        .visual-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px; 
        }

        /* Star Map circular style */
        .star-map-visual {
            width: 260px; 
            height: 260px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
        }
        
        .star-map-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Text alignments */
        .text-stack {
            display: flex;
            flex-direction: column;
            gap: 8px; 
            align-items: center;
            margin-top: 10px; 
        }

        /* Separator line */
        .verbatim-separator {
            width: 60%;
            border: none;
            border-top: 1px solid #1a1a1a; 
            margin: 20px auto 15px; 
        }

        /* Title text (Name) */
        .verbatim-title {
            font-size: 3.2rem; 
            font-weight: 300; 
            margin-bottom: 0px; 
            letter-spacing: 2px;
            font-family: 'Poppins', sans-serif;
            color: #1a1a1a; 
        }

        /* Descriptive text */
        .verbatim-descriptive-text {
            font-size: 1.05rem; 
            font-weight: 300; 
            line-height: 1.45; 
            font-family: 'Poppins', sans-serif;
            color: #333; 
        }

        /* Smaller text blocks */
        .verbatim-small-text {
            font-size: 0.95rem; 
            font-weight: 300; 
            line-height: 1.35; 
            font-family: 'Poppins', sans-serif;
            color: #555; 
        }

        /* Base Button & Container Styling */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
            margin-top: 30px; 
        }

        button {
            padding: 14px 24px; 
            font-size: 1.05rem; 
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 300px;
            background: transparent;
            border: 2px solid #1a1a1a; 
            color: #1a1a1a; 
        }

        button:hover {
            transform: translateY(-2px);
            background: #1a1a1a; 
            color: #ffffff; 
        }

        /* Animation for when text changes */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-panel fade-in" id="content-box">
        
        <div class="visual-container">
            <div class="star-map-visual">
                <img src="starmap.jpg" alt="The Night Sky">
            </div>
        </div>
        
        <h1 class="verbatim-title">Shruti</h1>
        <hr class="verbatim-separator">
        
        <div class="text-stack">
            <p class="verbatim-descriptive-text">The night sky the day you were born</p>
            <p class="verbatim-small-text">Tuesday, 01 May 2001</p>
            <p class="verbatim-small-text">16.992895° N, 73.31996° E</p>
        </div>
        
        <div class="btn-container" id="button-container">
            <button onclick="nextPage()">Begin Journey</button>
        </div>
    </div>

    <script>
        // Define your journey data. This array can be populated later.
        const journeyPages = [
            {
                visual: "starmap.jpg",
                title: "Shruti",
                descriptiveText: "The night sky the day you were born",
                dateText: "Tuesday, 01 May 2001",
                coordinatesText: "16.992895° N, 73.31996° E",
                btnText: "Begin Journey"
            }
            // Add future pages here when you are ready!
        ];

        let currentIndex = 0;

        function updatePage() {
            // This is ready for when we add more pages to the array
            const currentData = journeyPages[currentIndex];
            const contentBox = document.getElementById('content-box');
            
            // Trigger animation
            contentBox.classList.remove('fade-in');
            void contentBox.offsetWidth; 
            contentBox.classList.add('fade-in');
        }

        function nextPage() {
            // When you are ready to add more pages, this function will move to the next one!
            // For now, it just triggers an alert since it's the only page.
            if (journeyPages.length > 1) {
                currentIndex++;
                updatePage();
            } else {
                alert("More pages coming soon!");
            }
        }
    </script>
</body>
</html>
